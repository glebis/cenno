name: CennoCompanion
options:
  bundleIdPrefix: app.cenno
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
    macOS: "14.0"

settings:
  DEVELOPMENT_TEAM: "79SP7TM5PH"
  CODE_SIGN_STYLE: Automatic

packages:
  A2UISwift:
    path: Vendor/a2ui-swift

targets:

  # ── Shared framework (iOS) ───────────────────────────────────────────────────
  CennoShared:
    type: framework
    platform: iOS
    sources:
      - path: Sources/Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: app.cenno.companion.shared
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - sdk: CloudKit.framework
      - package: A2UISwift
        product: A2UISwiftUI

  # ── Shared framework unit tests (iOS) ────────────────────────────────────────
  CennoSharedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CennoSharedTests
    dependencies:
      - target: CennoShared
      - package: A2UISwift
        product: A2UISwiftUI
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: app.cenno.companion.sharedtests

  # ── Shared framework (watchOS) ───────────────────────────────────────────────
  CennoSharedWatch:
    type: framework
    platform: watchOS
    sources:
      - path: Sources/Shared
        # The A2UI renderer bridge is iPhone-only (Watch stays native simple
        # prompts); excluding it keeps a2ui-swift out of the watchOS build.
        excludes:
          - A2UIMessageBuilder.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: app.cenno.shared.watch
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - sdk: CloudKit.framework

  # ── iPhone app ──────────────────────────────────────────────────────────────
  CennoiPhone:
    type: application
    platform: iOS
    sources:
      - path: Sources/iPhone
    dependencies:
      - target: CennoShared
        embed: true
      - target: CennoWatch
        embed: true
      - package: A2UISwift
        product: A2UISwiftUI
    info:
      path: Sources/iPhone/Info.plist
      properties:
        CFBundleDisplayName: Cenno
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        NSRemoteNotificationUsageDescription: "cenno needs notifications to deliver agent prompts."
        # The phone is the primary silent-push target: its didReceiveRemoteNotification
        # fetches when the CKQuerySubscription fires. Background content-available
        # pushes are only delivered to a backgrounded app with this mode set.
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.cenno.companion
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Debug → development APNs / Development CloudKit (proven local loop).
        # Release/archive → production APNs for TestFlight + App Store.
        Debug:
          CODE_SIGN_ENTITLEMENTS: Sources/iPhone/CennoiPhone.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Sources/iPhone/CennoiPhone.Release.entitlements

  # ── iPhone UI tests (render → tap → submit) ──────────────────────────────────
  CennoiPhoneUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/CennoiPhoneUITests
    dependencies:
      - target: CennoiPhone
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: app.cenno.companion.uitests
      TEST_TARGET_NAME: CennoiPhone

  # ── Watch app ───────────────────────────────────────────────────────────────
  CennoWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources/Watch
    dependencies:
      - target: CennoSharedWatch
        embed: true
    info:
      path: Sources/Watch/Info.plist
      properties:
        CFBundleDisplayName: Cenno
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKCompanionAppBundleIdentifier: app.cenno.companion
        UIBackgroundModes:
          - remote-notification
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: app.cenno.companion.watch
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      LD_RUNPATH_SEARCH_PATHS:
        - "$(inherited)"
        - "@executable_path/Frameworks"
    entitlements:
      path: Sources/Watch/CennoWatch.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.app.cenno
        com.apple.developer.icloud-services:
          - CloudKit

  # ── Phase-1 CloudKit relay test writer (macOS) ────────────────────────────────
  CennoRelayTest:
    type: application
    platform: macOS
    sources:
      - path: Sources/RelayTest
    info:
      path: Sources/RelayTest/Info.plist
      properties:
        LSUIElement: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: app.cenno
    entitlements:
      path: Sources/RelayTest/RelayTest.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.app.cenno
        com.apple.developer.icloud-services:
          - CloudKit

schemes:
  CennoRelayTest:
    build:
      targets:
        CennoRelayTest: all
    run:
      config: Debug

  CennoiPhone:
    build:
      targets:
        CennoiPhone: all
        CennoShared: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CennoSharedTests
        - CennoiPhoneUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  CennoWatch:
    build:
      targets:
        CennoWatch: all
        CennoSharedWatch: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
